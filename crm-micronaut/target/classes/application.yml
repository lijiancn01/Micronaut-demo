micronaut:
  application:
    name: crm-micronaut
  server:
    port: 8080
  router:
    static-resources:
      default:
        enabled: true
        paths: classpath:static
      webjars:
        enabled: true
        paths: classpath:META-INF/resources/webjars

datasources:
  default:
    url: jdbc:h2:mem:crm;MODE=MYSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password: ""
    schema-generate: CREATE_DROP
    dialect: H2

jpa:
  default:
    entity-scan:
      packages: com.crm.demo.entity
    properties:
      hibernate:
        hbm2ddl:
          auto: create-drop
        show_sql: true
        format_sql: true
